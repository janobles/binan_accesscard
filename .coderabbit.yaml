# CodeRabbit configuration for binan_accesscard (CodeIgniter 4).
# Docs: https://docs.coderabbit.ai/reference/yaml-template
language: en-US
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  poem: false
  auto_review:
    enabled: true
    drafts: false

  # Skip generated / vendored / non-source paths so reviews stay focused on app code.
  path_filters:
    - "!vendor/**"
    - "!writable/**"
    - "!public/vendor/**"
    - "!public/assets/**/*.min.js"
    - "!**/*.sql"
    - "!**/*.xlsx"
    - "!docs/superpowers/**"

  # Repo-specific rules so CodeRabbit flags violations of our non-negotiables.
  path_instructions:
    - path: "app/**"
      instructions: >-
        PHP 8.2+, CodeIgniter 4. NON-NEGOTIABLES: (1) No DB migrations — schema
        source of truth is the SQL dump (accesscardV14.sql); flag any migration or
        in-code schema/enum change. (2) Every family mutation must write an
        audit_trails row via Audit\AuditTrailsModel; flag family writes that skip
        it. (3) Column names, enum values, and role names must match the SQL dump
        exactly (employee accounts store as the `User` role). (4) Controllers
        decide, libraries/models build view-data — flag query logic added to
        controllers. Prefer minimal, surgical changes over refactors.
    - path: "app/Views/**"
      instructions: >-
        Use the project house style only: stat-card, sector-management,
        records-search-panel, nav nav-tabs manage-tabs, Bootstrap Icons (bi-*).
        Flag SB-Admin-Pro demo classes (border-left-*, card h-100,
        text-xs text-uppercase) and any hardcoded <script>/<link> — assets must
        load through app/Helpers/asset_helper.php. Escape all server data.
    - path: "tests/**"
      instructions: >-
        No-DB test posture: model methods return safe empty shapes on DB error and
        tests are contract/route/grep based (no live-DB round-trips). Don't suggest
        tests that require a live database connection.

chat:
  auto_reply: true
